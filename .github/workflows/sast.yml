name: SAST

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -c .bandit -r backend -f json -o bandit-report.json

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: bandit-report
          path: bandit-report.json

  frontend-audit:
    name: npm audit (Frontend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run npm audit
        working-directory: web
        run: npm audit --audit-level=high

  container-scan:
    name: Trivy (Container Scan)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build backend image
        run: docker build -t vantage-backend:scan ./backend

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: "vantage-backend:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
