version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: iteam_threat_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: iteam_secure_password
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: iteam_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: iteam_secure_password
      ME_CONFIG_MONGODB_URL: mongodb://admin:iteam_secure_password@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      - mongodb

volumes:
  mongodb_data:
