services:
  mongodb:
    image: mongo:latest
    container_name: iteam_threat_mongo
    restart: unless-stopped
    network_mode: host
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: iteam_secure_password
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express
    container_name: iteam_mongo_express
    restart: unless-stopped
    network_mode: host
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: iteam_secure_password
      ME_CONFIG_MONGODB_URL: mongodb://admin:iteam_secure_password@127.0.0.1:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
      ME_CONFIG_SITE_BASEURL: /
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: iteam_threat_backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://admin:iteam_secure_password@localhost:27017/
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:5173","http://localhost:3000"]'
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      network: host
    container_name: iteam_threat_frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend

volumes:
  mongodb_data:
