services:
  mongodb:
    image: mongo:8
    container_name: iteam_threat_mongo
    restart: unless-stopped
    network_mode: host
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # mongo-express is only available in dev profile.
  # Run with: docker compose --profile dev up
  # NOTE: with network_mode: host, mongo-express binds to all interfaces on port 8081.
  # Protect it with a firewall rule: ufw deny in 8081 (allow only trusted IPs).
  mongo-express:
    image: mongo-express:1.0.2
    container_name: iteam_mongo_express
    restart: unless-stopped
    profiles: [dev]
    network_mode: host
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@localhost:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASICAUTH_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASICAUTH_PASSWORD}
      ME_CONFIG_SITE_BASEURL: /
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iteam_threat_backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@localhost:27017/
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:5173","http://localhost:3000"]'
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: iteam_threat_frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend

volumes:
  mongodb_data:
