services:
  mongodb:
    image: mongo:8
    container_name: vantage_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - vantage_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 })\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # mongo-express stays in the dev profile and only binds to localhost.
  mongo-express:
    image: mongo-express:1.0.2
    container_name: vantage_mongo_express
    restart: unless-stopped
    profiles: [dev]
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/admin?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASICAUTH_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASICAUTH_PASSWORD}
      ME_CONFIG_SITE_BASEURL: /
    networks:
      - vantage_internal
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vantage_backend
    restart: unless-stopped
    ports:
      # Keep the API local to the host unless an explicit proxy is added.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/admin?authSource=admin
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:5173","http://localhost:3000"]'
    networks:
      - vantage_internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health/ready', timeout=2)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      mongodb:
        condition: service_healthy

  # Attach the backend to docker0 when the custom bridge does not provide
  # outbound connectivity on this host/kernel combination.
  backend-egress:
    image: docker:cli
    container_name: vantage_backend_egress
    restart: "no"
    profiles: [egress-workaround]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: ["sh", "-c", "docker network connect bridge vantage_backend 2>/dev/null; echo egress-attached"]
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: vantage_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      API_UPSTREAM: http://backend:8000
    networks:
      - vantage_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongodb_data:

networks:
  vantage_internal:
    driver: bridge
