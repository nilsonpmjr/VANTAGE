services:
  mongodb:
    image: mongo:8
    container_name: vantage_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - vantage_internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # mongo-express is only available in dev profile.
  # Run with: docker compose --profile dev up
  # It binds only to localhost on port 8081.
  mongo-express:
    image: mongo-express:1.0.2
    container_name: vantage_mongo_express
    restart: unless-stopped
    profiles: [dev]
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/admin?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASICAUTH_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASICAUTH_PASSWORD}
      ME_CONFIG_SITE_BASEURL: /
    networks:
      - vantage_internal
    depends_on:
      mongodb:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vantage_backend
    restart: unless-stopped
    ports:
      # Bind the API to localhost only in the default compose profile.
      # This preserves the current frontend contract (browser -> localhost:8000)
      # without exposing the backend on all host interfaces by default.
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/admin?authSource=admin
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:5173","http://localhost:3000"]'
    networks:
      - vantage_internal
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: vantage_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - vantage_internal
    depends_on:
      - backend

volumes:
  mongodb_data:

networks:
  vantage_internal:
    driver: bridge
